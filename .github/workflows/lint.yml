name: linter

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          composer install -q --no-ansi --no-interaction --no-progress --prefer-dist
          npm ci

      - name: Check PHP code style (Pint)
        run: composer lint:check

      - name: Check automated refactors (Rector)
        run: composer refactor:check

      - name: Generate frontend route helpers (Wayfinder)
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan wayfinder:generate --with-form

      - name: Lint Frontend (ESLint)
        run: npm run lint:check

      - name: Check Frontend formatting (Prettier)
        run: npm run format:check

      - name: Check Frontend types (tsc)
        run: npm run types:check
